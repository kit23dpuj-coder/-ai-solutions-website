{% extends "base.html" %}
{% block content %}

<div class="chatbot-page-wrapper">
    <div class="chatbot-header">
        <h1><i class="fas fa-robot" style="color: #60a5fa;"></i> AI Virtual Assistant</h1>
        <p>Ask me about demos, AI solutions, prototyping, pricing, or talk to a human.</p>
    </div>

    <div class="chatbot-container">
        <!-- Chat Messages -->
        <div id="chatbox" class="chatbox-messages">
            <div class="message bot">
                <span class="msg-icon">🤖</span>
                <div class="msg-content">
                    <strong style="color:#60a5fa;">AI:</strong> Hello! I'm your AI assistant. How can I help today? 😊
                </div>
            </div>
        </div>

        <!-- Quick Reply Buttons -->
        <div class="quick-replies">
            <button class="qr-btn" data-msg="Schedule a demo">📅 Schedule Demo</button>
            <button class="qr-btn" data-msg="Virtual Assistant">🤖 Virtual Assistant</button>
            <button class="qr-btn" data-msg="Prototyping">⚡ Prototyping</button>
            <button class="qr-btn" data-msg="Pricing">💰 Pricing</button>
            <button class="qr-btn" data-msg="Talk to human">👤 Talk to Human</button>
            <button class="qr-btn" data-msg="Help">❓ Help</button>
            <button class="qr-btn" data-msg="Services">🚀 Services</button>
            <button class="qr-btn" data-msg="About">ℹ️ About</button>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="userInput" class="chat-input" placeholder="Type your message...">
            <button id="sendBtn" class="chat-send-btn">Send ➤</button>
        </div>
    </div>
</div>

<script>
    const chatbox = document.getElementById('chatbox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `message ${sender === 'You' ? 'user' : 'bot'}`;
        const icon = sender === 'You' ? '👤' : '🤖';
        const color = sender === 'You' ? '#f0f3f8' : '#60a5fa';
        div.innerHTML = `
            <span class="msg-icon">${icon}</span>
            <div class="msg-content">
                <strong style="color:${color};">${sender}:</strong> ${text}
            </div>
        `;
        chatbox.appendChild(div);
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    async function sendMessage(msg) {
        if (!msg || !msg.trim()) return;
        addMessage('You', msg);
        try {
            const res = await fetch('/chatbot', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            addMessage('AI', data.response);
        } catch(e) {
            addMessage('AI', 'Sorry, something went wrong. Try again.');
        }
    }

    sendBtn.onclick = function() {
        const msg = userInput.value.trim();
        if (msg) {
            sendMessage(msg);
            userInput.value = '';
        }
    };

    userInput.onkeypress = function(e) {
        if (e.key === 'Enter') {
            const msg = userInput.value.trim();
            if (msg) {
                sendMessage(msg);
                userInput.value = '';
            }
        }
    };

    document.querySelectorAll('.qr-btn').forEach(function(btn) {
        btn.onclick = function() {
            const msg = this.getAttribute('data-msg');
            sendMessage(msg);
        };
    });
</script>

{% endblock %}
